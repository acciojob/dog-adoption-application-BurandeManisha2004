<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<form action="" method="get" class="form-container">

    <h2>Dog Adoption Form</h2>

    <input type="text" id="name" name="name" placeholder="Name" required>

    <input type="text" id="phone" name="phone" placeholder="Phone Number" required>

    <input type="text" id="address" name="address" placeholder="Address" required>

    <label>
        <input type="checkbox" id="checkbox" name="checkbox" value="Have you ever lived with a Dog before?">
        Have you ever lived with a Dog before?
    </label>

    <label for="multiSelect">Select Preferred Breeds:</label>
    <select id="multiSelect" name="multiSelect" multiple>
        <option value="labrador">Labrador Retriever</option>
        <option value="golden">Golden Retriever</option>
        <option value="beagle">Beagle</option>
    </select>

    <input type="submit" value="Submit" id="submit">

</form>

<script src="./script.js"></script>

</body>

</html>
